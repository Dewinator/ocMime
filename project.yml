name: OpenClawFace
options:
  bundleIdPrefix: net.eab-solutions
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Read from the DEVELOPMENT_TEAM env var so forks don't need to touch
    # project.yml. Set it once in your shell, e.g. `export DEVELOPMENT_TEAM=XXXXXXXXXX`.
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic

targets:

  # ── macOS App: Bridge / Control Center ──
  OpenClawFace:
    type: application
    platform: macOS
    sources:
      - path: macOS
      - path: Shared
    info:
      path: macOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: "OpenClaw Face"
        LSApplicationCategoryType: "public.app-category.utilities"
        NSMainStoryboardFile: ""
        NSLocalNetworkUsageDescription: "OpenClaw Face needs local network access to communicate with the iOS display device."
        NSBonjourServices:
          - "_openclawface._tcp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.eab-solutions.openclawface
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: macOS/Resources/OpenClawFace.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  # ── iOS App: Display / Face ──
  OpenClawDisplay:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
    info:
      path: iOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: "OpenClaw Display"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: YES
        NSLocalNetworkUsageDescription: "OpenClaw Display needs local network access to receive emotion commands from the Mac bridge."
        NSBonjourServices:
          - "_openclawface._tcp"
        NSMicrophoneUsageDescription: "OpenClaw Display uses the microphone for speech-to-text and sound analysis to interact with the AI agent."
        NSSpeechRecognitionUsageDescription: "OpenClaw Display uses on-device speech recognition to convert your voice to text for the AI agent."
        NSCameraUsageDescription: "OpenClaw Display uses the camera to detect when someone enters the room, so the AI agent can react."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.eab-solutions.openclawdisplay
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
